

<!DOCTYPE html>
<html lang="ja">
  <head>
    
    <meta charset="UTF-8" />

    <!-- viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title / description -->
    <title>新規会員登録 ｜ ohenro.online</title>
    <meta name="description" content="ohenro.onlineの会員登録にあたり、メールアドレスを入力してください。" />

    <!-- OGP -->
    <meta property="og:title" content="新規会員登録" />
    <meta property="og:description" content="ohenro.onlineの会員登録にあたり、メールアドレスを入力してください。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ohenro.online/ja/signup/" />
    <meta property="og:image" content="" />

    <!-- favicon,apple-touch-icon -->
    <link rel="icon" href="/assets/images/favicon.ico" />
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png" />

    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/style.css" />

    <!-- JS -->
    <script src="/assets/js/common.js" defer></script>
    <script src="/assets/js/survey.js" defer></script>
    
    <!-- /es,de,fr,it の時のみタグを出力 -->
    
  </head>
  <body>
    
    <header class="my-page-header">
  <div class="my-page-header__logo">
    <figure class="my-page-header__logo-figure">
      <img
        src="/assets/images/common/ohenro-logo.webp"
        class="my-page-header__logo-image"
        alt="88お遍路さん"
      />
    </figure>
  </div>
</header>

    

    <main>
      <section class="signup">
  
  
  
  
  <div class="auth-completion">
    <div class="auth-completion__inner">
      <div class="auth-completion__title">
        
<h1 class="page-title">
	<span class="page-title__text ">新規会員登録</span>
</h1>

        <p class="auth-completion__title-description">メールアドレスを入力してください</p>
      </div>
      <form class="auth-completion__form">
        
<div class="text-fiedl">
  <label for="email" class="text-fiedl__label ">メールアドレス</label>
  <input 
    type="email" 
    id="email" 
    name="email"
    maxlength="254"
    placeholder="Your Email" 
    class="text-fiedl__input "
  >
  <!-- エラー文言 -->
   <div class="error ">
    <div class="error-message">
      <p class="error-message__text">無効なメールアドレスです</p>
    </div>
  </div>
</div>

        <div class="auth-completion__buttons">
        
  
    <a href="/ja/login/"  class="button-normal__button">
      <span class="button-normal__button-text">キャンセル</span>    
    </a>
  

        
  
    <button
      type="submit"
      
      class="button-primary__button"
    >
      <!-- ログアウトアイコン -->
      
      <span class="button-primary__button-text">送信</span>
    </button>

  
 
      </div>
      </form>
    </div>
  </div>
</section>

    </main>

    
    <footer class="footer">
	<div class="footer__inner">
		<p class="footer__copy">copyright &copy;OHENRO.online</p>
	</div>
</footer>
    

  </body>
</html>
