

<!DOCTYPE html>
<html lang="ja">
  <head>
    
    <meta charset="UTF-8" />

    <!-- viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title / description -->
    <title>入力内容の確認 ｜ ohenro.online</title>
    <meta name="description" content="入力したお客様の情報を確認してください。" />

    <!-- OGP -->
    <meta property="og:title" content="入力内容の確認" />
    <meta property="og:description" content="入力したお客様の情報を確認してください。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ohenro.online/ja/form/confirm/" />
    <meta property="og:image" content="" />

    <!-- favicon,apple-touch-icon -->
    <link rel="icon" href="/assets/images/favicon.ico" />
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png" />

    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/style.css" />

    <!-- JS -->
    <script src="/assets/js/common.js" defer></script>
    <script src="/assets/js/survey.js" defer></script>
    
    <!-- /es,de,fr,it の時のみタグを出力 -->
    
  </head>
  <body>
    
    <header class="my-page-header">
  <div class="my-page-header__logo">
    <figure class="my-page-header__logo-figure">
      <img
        src="/assets/images/common/ohenro-logo.webp"
        class="my-page-header__logo-image"
        alt="88お遍路さん"
      />
    </figure>
  </div>
</header>

    

    <main>
      




<section class="registration">
	<div class="auth-page-heading">
		<div class="auth-page-heading__title">
			<span>
<h1 class="page-title">
	<span class="page-title__text ">登録情報の確認</span>
</h1>
</span>
		</div>
		<div class="auth-page-heading__breadcrumbs">
      
<nav class="breadcrumbs">
  <a href="/ja/">HOME</a>

  
    <span> &gt; </span>

    
      <span>登録情報の確認</span>
    
  
</nav>

		</div>
	</div>

	<div class="auth-completion is-no-margin">
		<div class="registration__title">
			<p class="registration__title-descrption">内容にお間違いがなければ「登録する」ボタンを押して、会員登録を完了してください。修正がある場合は「登録情報をする修正」ボタンから入力内容を修正できます。</p>
		</div>		
		
		<div class="auth-completion__inner">
            
        <dl class="confirm__list">
          
            <div class="confirm__item">
              <dt class="confirm__item-label is-required">
                メールアドレス
              </dt>
              <dd class="confirm__item-value">ohenro-taro@ohenro.jp</dd>
              <input type="hidden" name="email" value="ohenro-taro@ohenro.jp">
            </div>
          
            <div class="confirm__item">
              <dt class="confirm__item-label is-required">
                名
              </dt>
              <dd class="confirm__item-value">太郎</dd>
              <input type="hidden" name="first_name" value="太郎">
            </div>
          
            <div class="confirm__item">
              <dt class="confirm__item-label is-required">
                姓
              </dt>
              <dd class="confirm__item-value">お遍路</dd>
              <input type="hidden" name="last_name" value="お遍路">
            </div>
          
            <div class="confirm__item">
              <dt class="confirm__item-label is-required">
                セイ
              </dt>
              <dd class="confirm__item-value">タロウ</dd>
              <input type="hidden" name="first_kana" value="タロウ">
            </div>
          
            <div class="confirm__item">
              <dt class="confirm__item-label is-required">
                メイ
              </dt>
              <dd class="confirm__item-value">オヘンロ</dd>
              <input type="hidden" name="last_kana" value="オヘンロ">
            </div>
          
            <div class="confirm__item">
              <dt class="confirm__item-label is-required">
                年代
              </dt>
              <dd class="confirm__item-value">30代</dd>
              <input type="hidden" name="age" value="30代">
            </div>
          
            <div class="confirm__item">
              <dt class="confirm__item-label ">
                メールマガジンの購読
              </dt>
              <dd class="confirm__item-value">購読する</dd>
              <input type="hidden" name="magazine" value="購読する">
            </div>
          
            <div class="confirm__item">
              <dt class="confirm__item-label is-required">
                個人情報保護ポリシー
              </dt>
              <dd class="confirm__item-value">同意する</dd>
              <input type="hidden" name="consent" value="同意する">
            </div>
          
        </dl>
			<form class="auth-completion__form">
				<div class="auth-completion__buttons">
				
  
    <a href="/ja/signup/form/"  class="button-normal__button">
      <span class="button-normal__button-text">登録情報を修正する</span>    
    </a>
  

        
  
    <button
      type="submit"
      
      class="button-primary__button"
    >
      <!-- ログアウトアイコン -->
      
      <span class="button-primary__button-text">確認する</span>
    </button>

  

			</div>
			</form>
		</div>
	</div>
</section>
    </main>

    
    <footer class="footer">
	<div class="footer__inner">
		<p class="footer__copy">copyright &copy;OHENRO.online</p>
	</div>
</footer>
    

  </body>
</html>
