<script type="text/javascript"><!--
$(function() {
  // チェックボックスのクリックを無効化します。
  $('.image_box .disabled_checkbox').click(function() {
    return false;
  });

  // 画像がクリックされた時の処理です。
  $('img.thumbnail').on('click', function() {
    if (!$(this).is('.checked')) {
      // チェックが入っていない画像をクリックした場合、チェックを入れます。
      $(this).addClass('checked');
      $(this).parent().find(".disabled_checkbox").prop('checked', true);
    } else {
      // チェックが入っている画像をクリックした場合、チェックを外します。
      $(this).removeClass('checked')
      $(this).parent().find(".disabled_checkbox").prop('checked', false);
    }
    chg_del();
  });
});

//画像削除確認ダイアログ
function delete_image(id) {
	if (window.confirm("この画像を削除します。よろしいですか？")) {
		document.form_detail.mode.value = 'image_del1';
		if (id != "select") {
			document.form_detail.num.value = id;
		}
		document.form_detail.submit();
	}
}

//画像が選択されているかの判定
function is_select() {
	var tmp = document.form_detail.image_check;
	var flag = false;
	var ch;
	document.form_detail.num.value = "";

	//画像が1つしかない場合は配列に格納
	if (tmp.length) {
		ch = tmp;
	}
	else {
		ch = new Array();
		ch[0] = tmp;
	}

	for (i = 0; i < ch.length; i++) {
		if (ch[i].checked) {
			document.form_detail.num.value += ch[i].value + ",";
			flag = true;
		}
	}

	return flag;
}

//すべて選択・解除ボタン
function select_all() {
	var tmp = document.form_detail.image_check;
	var im = document.getElementsByClassName("thumbnail") ;
	var flag = true;
	var ch;
	if (is_select()) {
		flag = false;
	}

	//画像が1つしかない場合は配列に格納
	if (tmp.length) {
		ch = tmp;
	}
	else {
		ch = new Array();
		ch[0] = tmp;
	}

	for (i = 0; i < ch.length; i++) {
		ch[i].checked = flag;
		if (flag) {
			im[i].classList.add("checked");
		}
		else {
			im[i].classList.remove("checked");
		}
	}

	chg_del();
	return false;
}

//削除ボタンの有効・無効切り替え
function chg_del() {
	if (is_select()) {
		$("#del_img").prop("disabled", false);
	}
	else {
		$("#del_img").prop("disabled", true);
	}
}
